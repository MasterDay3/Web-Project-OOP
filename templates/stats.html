<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Numerix · Статистика</title>
    {% include 'partials/theme-init.html' %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-theme.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body class="page-light">
    {% set active = 'stats' %}
    {% include 'partials/sidebar.html' %}

    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Аналітика</p>
            <h1>Графік успішності</h1>
        </section>

        <div class="stats-grid">

            <!-- Кількість задач по днях -->
            <section class="glass-card stats-card stats-wide">
                <h3>Задачі за останні 30 днів</h3>
                <canvas id="chartTasks"></canvas>
            </section>

            <!-- % правильних по днях -->
            <section class="glass-card stats-card stats-wide">
                <h3>Точність за останні 30 днів</h3>
                <canvas id="chartAccuracy"></canvas>
            </section>

            <!-- Успішність по системах — бар -->
            <section class="glass-card stats-card">
                <h3>Точність по системах</h3>
                <canvas id="chartSystems"></canvas>
            </section>

            <!-- Кількість задач по системах — донат -->
            <section class="glass-card stats-card">
                <h3>Задачі по системах</h3>
                <canvas id="chartDoughnut"></canvas>
            </section>

        </div>
    </main>

    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stats-card {
            padding: 24px;
        }

        .stats-card h3 {
            margin: 0 0 16px;
            font-size: 18px;
        }

        .stats-wide {
            grid-column: 1 / -1;
        }

        @media (max-width: 700px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stats-wide {
                grid-column: 1;
            }
        }
    </style>

    <script>
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const ACCENT = isDark ? '#e86a6a' : '#b21f1f';
        const GREEN = '#22c55e';
        const COLORS = isDark
            ? ['#e86a6a', '#60a5fa', '#fbbf24', '#4ade80', '#a78bfa']
            : ['#b21f1f', '#3b82f6', '#f59e0b', '#22c55e', '#8b5cf6'];

        if (isDark) {
            Chart.defaults.color = '#9b9498';
            Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
        }

        async function loadCharts() {
            const res = await fetch('/stats/data');
            const data = await res.json();

            // ── Задачі по днях ────────────────────────────────────────────
            new Chart(document.getElementById('chartTasks'), {
                type: 'bar',
                data: {
                    labels: data.days,
                    datasets: [{
                        label: 'Задач за день',
                        data: data.tasks_per_day,
                        backgroundColor: ACCENT + '99',
                        borderColor: ACCENT,
                        borderWidth: 1,
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });

            // ── Точність по днях ──────────────────────────────────────────
            new Chart(document.getElementById('chartAccuracy'), {
                type: 'line',
                data: {
                    labels: data.days,
                    datasets: [{
                        label: 'Точність %',
                        data: data.accuracy_per_day,
                        borderColor: GREEN,
                        backgroundColor: GREEN + '22',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: GREEN,
                        spanGaps: true,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 100, ticks: { callback: v => v + '%' } }
                    }
                }
            });

            // ── Точність по системах ──────────────────────────────────────
            new Chart(document.getElementById('chartSystems'), {
                type: 'bar',
                data: {
                    labels: data.systems_labels,
                    datasets: [{
                        label: 'Точність %',
                        data: data.systems_accuracy,
                        backgroundColor: COLORS,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 100, ticks: { callback: v => v + '%' } }
                    }
                }
            });

            // ── Донат — задачі по системах ────────────────────────────────
            new Chart(document.getElementById('chartDoughnut'), {
                type: 'doughnut',
                data: {
                    labels: data.systems_labels,
                    datasets: [{
                        data: data.systems_done,
                        backgroundColor: COLORS,
                        borderWidth: 2,
                        borderColor: isDark ? '#1e1c24' : '#fff',
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        loadCharts();
    </script>
</body>

</html>
