<div class="bg-symbols" aria-hidden="true"></div>
<script src="{{ url_for('static', filename='js/bg-symbols.js') }}"></script>

<aside class="sidebar">
  <div class="sidebar-top">
    <a href="{{ url_for('home') }}" class="sidebar-brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Numerix</span>
    </a>

    <nav class="sidebar-nav">
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('dashboard') }}" class="sidebar-link {{ 'active' if active == 'dashboard' }}">
        <span class="sidebar-icon"><i data-lucide="home"></i></span> Кабінет
      </a>
      {% endif %}
      <a href="{{ url_for('home') }}" class="sidebar-link {{ 'active' if active == 'converter' }}">
        <span class="sidebar-icon"><i data-lucide="arrow-left-right"></i></span> Конвертор
      </a>
      <a href="{{ url_for('calculator_page') }}" class="sidebar-link {{ 'active' if active == 'calculator' }}">
        <span class="sidebar-icon"><i data-lucide="calculator"></i></span> Калькулятор
      </a>
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('task_routes.tasks_page') }}" class="sidebar-link {{ 'active' if active == 'tasks' }}">
        <span class="sidebar-icon"><i data-lucide="pen-line"></i></span> Задачі
      </a>
      <a href="{{ url_for('leaderboard_routes.leaderboard') }}" class="sidebar-link {{ 'active' if active == 'leaderboard' }}">
        <span class="sidebar-icon"><i data-lucide="trophy"></i></span> Рейтинг
      </a>
      <a href="{{ url_for('stats_routes.stats') }}" class="sidebar-link {{ 'active' if active == 'stats' }}">
        <span class="sidebar-icon"><i data-lucide="bar-chart-3"></i></span> Статистика
      </a>
      <a href="{{ url_for('mistakes_routes.mistakes') }}" class="sidebar-link {{ 'active' if active == 'mistakes' }}">
        <span class="sidebar-icon"><i data-lucide="rotate-ccw"></i></span> Помилки
      </a>
      {% endif %}
    </nav>
  </div>

  <div class="sidebar-bottom">
    <button type="button" class="theme-toggle" id="theme-toggle">
      <span class="theme-toggle-icon"><i data-lucide="moon"></i></span>
      <span class="theme-toggle-label">Темна тема</span>
    </button>
    {% if current_user.is_authenticated %}
    <a href="{{ url_for('profile_routes.profile') }}" class="sidebar-link {{ 'active' if active == 'profile' }}">
      <span class="sidebar-icon"><i data-lucide="user"></i></span> Профіль
    </a>
    <a href="{{ url_for('auth_routes.logout') }}" class="sidebar-link sidebar-logout">
      <span class="sidebar-icon"><i data-lucide="log-out"></i></span> Вийти
    </a>
    {% else %}
    <a href="{{ url_for('auth_routes.login') }}" class="sidebar-link">
      <span class="sidebar-icon"><i data-lucide="log-in"></i></span> Увійти
    </a>
    <a href="{{ url_for('auth_routes.register') }}" class="sidebar-link sidebar-register">
      <span class="sidebar-icon"><i data-lucide="user-plus"></i></span> Реєстрація
    </a>
    {% endif %}
  </div>
</aside>

<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
<script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
